<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="900" viewBox="0 0 1240 900" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- ====================================================================
       Arvis chat panel — annotated mock (current state + 2 design opportunities)
       Colors are the REAL light-theme tokens from sena_ai_sidebar.bundle.css
       =================================================================== -->
  <defs>
    <filter id="lift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <filter id="softlift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- page bg -->
  <rect width="1240" height="900" fill="#ece6d6"/>
  <text x="40" y="34" font-size="20" font-weight="700" fill="#2c2a24">Arvis — chat panel (annotated mock)</text>
  <text x="40" y="54" font-size="12" fill="#6f695b">Light "paper" theme · real tokens · solid = current build, dashed = design opportunity</text>

  <!-- ======================= PANEL FRAME ======================= -->
  <!-- panel: bg #f4efe1, border #e4dcc6 -->
  <rect x="40" y="72" width="560" height="792" rx="14" fill="#f4efe1" stroke="#e4dcc6" stroke-width="1.5" filter="url(#lift)"/>

  <!-- ====== HEADER / topbar ====== -->
  <rect x="40" y="72" width="560" height="50" rx="14" fill="#fbf7ec"/>
  <rect x="40" y="108" width="560" height="14" fill="#fbf7ec"/>
  <line x1="40" y1="122" x2="600" y2="122" stroke="#e4dcc6" stroke-width="1"/>
  <text x="60" y="96" font-size="15" font-weight="700" fill="#2c2a24">Arvis</text>
  <text x="60" y="112" font-size="10.5" fill="#6f695b">AI chat</text>
  <!-- right cluster -->
  <text x="430" y="104" font-size="14" fill="#6f695b">☾</text>
  <rect x="450" y="86" width="52" height="24" rx="12" fill="#f4efe1" stroke="#e4dcc6"/>
  <text x="476" y="102" font-size="11" fill="#2c2a24" text-anchor="middle">Chat</text>
  <circle cx="516" cy="98" r="4" fill="#3aa76d"/>
  <text x="524" y="102" font-size="10.5" fill="#6f695b">online</text>
  <text x="566" y="103" font-size="14" fill="#6f695b">⟳</text>
  <text x="586" y="103" font-size="14" fill="#6f695b">✕</text>

  <!-- ====== ACTIONS row (History / New chat) ====== -->
  <rect x="382" y="134" width="86" height="26" rx="13" fill="#fbf7ec" stroke="#e4dcc6"/>
  <text x="425" y="151" font-size="11.5" fill="#6f695b" text-anchor="middle">⟲  History</text>
  <rect x="476" y="134" width="104" height="26" rx="13" fill="#fbf7ec" stroke="#e4dcc6"/>
  <text x="528" y="151" font-size="11.5" fill="#6f695b" text-anchor="middle">＋  New chat</text>

  <!-- ============ CHAT LOG ============ -->

  <!-- USER message (right, accent fill) -->
  <g filter="url(#softlift)">
    <rect x="300" y="180" width="284" height="92" rx="10" fill="#bb6a3c"/>
  </g>
  <!-- image attachment thumb -->
  <rect x="314" y="194" width="56" height="42" rx="6" fill="#a25a30" stroke="#d68a5c"/>
  <text x="342" y="219" font-size="9" fill="#ffe9d8" text-anchor="middle">🖼 ticket.png</text>
  <text x="314" y="256" font-size="12.5" fill="#ffffff">what's the stock on this item</text>
  <text x="314" y="262" font-size="12.5" fill="#ffffff"> </text>

  <!-- ASSISTANT message (left, surface card) -->
  <g filter="url(#softlift)">
    <rect x="56" y="292" width="420" height="236" rx="10" fill="#fbf7ec" stroke="#e4dcc6"/>
  </g>
  <!-- tool chips row (humanized) -->
  <rect x="68" y="304" width="168" height="20" rx="10" fill="#f4efe1" stroke="#e4dcc6"/>
  <text x="78" y="318" font-size="10" fill="#6f695b">✓ Looked up Item ITM-00021</text>
  <rect x="244" y="304" width="92" height="20" rx="10" fill="#f4efe1" stroke="#e4dcc6"/>
  <text x="254" y="318" font-size="10" fill="#6f695b">✓ Searched</text>
  <!-- thinking disclosure -->
  <text x="68" y="344" font-size="11" fill="#8a8474">▸ Thought for ~412 tokens</text>
  <!-- markdown body: heading + line + tiny table -->
  <text x="68" y="368" font-size="13" font-weight="700" fill="#2c2a24">Stock for Luxe-Max-4B</text>
  <text x="68" y="388" font-size="12" fill="#2c2a24">On hand across 3 warehouses:</text>
  <!-- mini table -->
  <line x1="68" y1="400" x2="300" y2="400" stroke="#e4dcc6"/>
  <text x="72" y="416" font-size="11" fill="#6f695b">Stores</text>      <text x="220" y="416" font-size="11" fill="#2c2a24">120</text>
  <text x="72" y="434" font-size="11" fill="#6f695b">Assembly</text>    <text x="220" y="434" font-size="11" fill="#2c2a24">34</text>
  <text x="72" y="452" font-size="11" fill="#6f695b">Finished Goods</text><text x="220" y="452" font-size="11" fill="#2c2a24">8</text>
  <line x1="68" y1="462" x2="300" y2="462" stroke="#e4dcc6"/>
  <text x="68" y="482" font-size="12" fill="#2c2a24">Finished Goods is low —</text>
  <!-- SmartLink "take me there" -->
  <text x="68" y="500" font-size="12" fill="#bb6a3c" text-decoration="underline">open the Item form ↗</text>
  <text x="206" y="500" font-size="12" fill="#2c2a24"> to reorder.</text>
  <!-- copy on hover -->
  <text x="456" y="518" font-size="12" fill="#b8b1a0">⧉</text>

  <!-- (DESIGN OPPORTUNITY) native record / metric card -->
  <rect x="56" y="544" width="300" height="78" rx="10" fill="#fbf7ec" stroke="#bb6a3c" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="70" y="566" font-size="11" font-weight="700" fill="#bb6a3c">ITM-00021 · Luxe-Max-4B</text>
  <rect x="70" y="576" width="78" height="34" rx="7" fill="#f4efe1"/>
  <text x="109" y="592" font-size="9" fill="#6f695b" text-anchor="middle">on hand</text>
  <text x="109" y="606" font-size="14" font-weight="700" fill="#2c2a24" text-anchor="middle">162</text>
  <rect x="156" y="576" width="78" height="34" rx="7" fill="#f4efe1"/>
  <text x="195" y="592" font-size="9" fill="#6f695b" text-anchor="middle">reorder</text>
  <text x="195" y="606" font-size="14" font-weight="700" fill="#c0392b" text-anchor="middle">low</text>
  <text x="246" y="600" font-size="10" fill="#bb6a3c">Open ↗</text>

  <!-- ====== COMPOSER ====== -->
  <line x1="40" y1="660" x2="600" y2="660" stroke="#e4dcc6" stroke-width="1"/>
  <!-- attachment preview row -->
  <rect x="56" y="672" width="46" height="36" rx="6" fill="#fbf7ec" stroke="#e4dcc6"/>
  <text x="79" y="694" font-size="9" fill="#8a8474" text-anchor="middle">🖼</text>
  <!-- fused composer surface -->
  <g filter="url(#softlift)">
    <rect x="56" y="718" width="528" height="48" rx="24" fill="#fbf7ec" stroke="#e4dcc6"/>
  </g>
  <text x="78" y="747" font-size="16" fill="#8a8474">📎</text>
  <text x="104" y="747" font-size="13" fill="#8a8474">Message Arvis…</text>
  <circle cx="558" cy="742" r="18" fill="#bb6a3c"/>
  <text x="558" y="747" font-size="14" fill="#ffffff" text-anchor="middle">➤</text>
  <!-- hint -->
  <text x="56" y="788" font-size="10.5" fill="#8a8474">Enter to send · paste or drop an image / PDF</text>

  <!-- ====================== ANNOTATION BADGES on panel ====================== -->
  <g font-size="12" font-weight="700" text-anchor="middle">
    <circle cx="52" cy="96"  r="11" fill="#2c2a24"/><text x="52" y="100" fill="#fff">1</text>
    <circle cx="612" cy="98" r="11" fill="#2c2a24"/><text x="612" y="102" fill="#fff">2</text>
    <circle cx="612" cy="147" r="11" fill="#2c2a24"/><text x="612" y="151" fill="#fff">3</text>
    <circle cx="48" cy="314" r="11" fill="#2c2a24"/><text x="48" y="318" fill="#fff">4</text>
    <circle cx="48" cy="344" r="11" fill="#2c2a24"/><text x="48" y="348" fill="#fff">5</text>
    <circle cx="488" cy="370" r="11" fill="#2c2a24"/><text x="488" y="374" fill="#fff">6</text>
    <circle cx="612" cy="200" r="11" fill="#2c2a24"/><text x="612" y="204" fill="#fff">7</text>
    <circle cx="488" cy="500" r="11" fill="#bb6a3c"/><text x="488" y="504" fill="#fff">8</text>
    <circle cx="368" cy="583" r="11" fill="#bb6a3c"/><text x="368" y="587" fill="#fff">9</text>
    <circle cx="612" cy="742" r="11" fill="#2c2a24"/><text x="612" y="746" fill="#fff">10</text>
    <circle cx="48" cy="788" r="11" fill="#2c2a24"/><text x="48" y="792" fill="#fff">11</text>
  </g>

  <!-- ====================== LEGEND (right gutter) ====================== -->
  <g font-size="12.5">
    <text x="660" y="96" font-size="14" font-weight="700" fill="#2c2a24">Annotations</text>
    <text x="660" y="116" font-size="11" fill="#8a8474">● current build   ● design opportunity</text>
    <circle cx="667" cy="112.5" r="4" fill="#2c2a24"/>
    <circle cx="745" cy="112.5" r="4" fill="#bb6a3c"/>

    <g fill="#2c2a24">
      <text x="660" y="150" font-weight="700">1 · Header — brand &amp; persona</text>
      <text x="660" y="167" font-size="11.5" fill="#5a554a">"Arvis" + mode label ("AI chat"). Sets a calm,</text>
      <text x="660" y="182" font-size="11.5" fill="#5a554a">human identity — never "terminal / SDK".</text>

      <text x="660" y="208" font-weight="700">2 · Header controls</text>
      <text x="660" y="225" font-size="11.5" fill="#5a554a">Light/dark toggle ☾, provider pill (Claude ttyd →</text>
      <text x="660" y="240" font-size="11.5" fill="#5a554a">Chat → Codex), status word + dot, reconnect, close.</text>

      <text x="660" y="266" font-weight="700">3 · History + New chat</text>
      <text x="660" y="283" font-size="11.5" fill="#5a554a">Appears once chats exist. History opens a modal</text>
      <text x="660" y="298" font-size="11.5" fill="#5a554a">drawer (title + "5m ago", open / delete).</text>

      <text x="660" y="324" font-weight="700">4 · Humanized tool chips</text>
      <text x="660" y="341" font-size="11.5" fill="#5a554a">Raw tools (Bash, mcp__…, ORM lookups) shown as</text>
      <text x="660" y="356" font-size="11.5" fill="#5a554a">friendly pills with running → ✓/✗ state.</text>

      <text x="660" y="382" font-weight="700">5 · Thinking disclosure</text>
      <text x="660" y="399" font-size="11.5" fill="#5a554a">Live "Thinking…" pill, then collapsible "Thought</text>
      <text x="660" y="414" font-size="11.5" fill="#5a554a">for ~N tokens" (full CoT redacted on this plan).</text>

      <text x="660" y="440" font-weight="700">6 · Assistant bubble</text>
      <text x="660" y="457" font-size="11.5" fill="#5a554a">Surface card, full markdown (headings, lists, code</text>
      <text x="660" y="472" font-size="11.5" fill="#5a554a">blocks, tables) as safe vnodes. Copy ⧉ on hover.</text>

      <text x="660" y="498" font-weight="700">7 · User bubble + attachments</text>
      <text x="660" y="515" font-size="11.5" fill="#5a554a">Accent fill, right-aligned. Image thumbs / PDF chips.</text>
      <text x="660" y="530" font-size="11.5" fill="#5a554a">Attach via 📎, paste, or drag-drop.</text>
    </g>

    <!-- design opportunities in accent -->
    <g fill="#a25a30">
      <text x="660" y="556" font-weight="700">8 · SmartLink "take me there"</text>
      <text x="660" y="573" font-size="11.5" fill="#7a5238">In-answer Desk links route the visible ERP tab in</text>
      <text x="660" y="588" font-size="11.5" fill="#7a5238">place (frappe.set_route) — the signature moment.</text>

      <text x="660" y="614" font-weight="700">9 · ⟂ Native ERP result cards (proposed)</text>
      <text x="660" y="631" font-size="11.5" fill="#7a5238">Render fetched records as glanceable cards / metric</text>
      <text x="660" y="646" font-size="11.5" fill="#7a5238">tiles / mini-charts instead of plain markdown text.</text>
    </g>

    <g fill="#2c2a24">
      <text x="660" y="672" font-weight="700">10 · Composer</text>
      <text x="660" y="689" font-size="11.5" fill="#5a554a">Fused rounded surface that lifts on focus, borderless</text>
      <text x="660" y="704" font-size="11.5" fill="#5a554a">auto-grow textarea, circular accent send / Stop btn.</text>

      <text x="660" y="730" font-weight="700">11 · Composer hint</text>
      <text x="660" y="747" font-size="11.5" fill="#5a554a">Enter sends · Shift+Enter newline · paste/drop files.</text>
    </g>
  </g>

  <!-- ====================== THEME SWATCHES ====================== -->
  <text x="660" y="784" font-size="13" font-weight="700" fill="#2c2a24">Theme tokens</text>
  <g font-size="9.5" text-anchor="middle" fill="#2c2a24">
    <rect x="660" y="794" width="46" height="40" rx="6" fill="#f4efe1" stroke="#ccc4ad"/><text x="683" y="850">bg</text>
    <rect x="710" y="794" width="46" height="40" rx="6" fill="#fbf7ec" stroke="#ccc4ad"/><text x="733" y="850">surface</text>
    <rect x="760" y="794" width="46" height="40" rx="6" fill="#e4dcc6"/><text x="783" y="850">border</text>
    <rect x="810" y="794" width="46" height="40" rx="6" fill="#bb6a3c"/><text x="833" y="850" fill="#fff">accent</text>
    <rect x="860" y="794" width="46" height="40" rx="6" fill="#2c2a24"/><text x="883" y="850" fill="#fff">text</text>
    <rect x="910" y="794" width="46" height="40" rx="6" fill="#1b1c1e"/><text x="933" y="850" fill="#fff">dark bg</text>
    <rect x="960" y="794" width="46" height="40" rx="6" fill="#c47a4a"/><text x="983" y="850" fill="#fff">dark acc</text>
  </g>
</svg>
